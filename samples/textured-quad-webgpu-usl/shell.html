  <title>GPU WebGPU USL Textured Quad</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; }
    body {
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #02050d;
    }
    main { display: grid; gap: 14px; justify-items: center; }
    canvas {
      width: min(92vw, 1280px);
      height: min(78vh, 720px);
      border: 1px solid #26344f;
      border-radius: 12px;
      box-shadow: 0 24px 80px #000b;
    }
    #status {
      color: #8ea0bf;
      font: 13px/1.4 ui-monospace, SFMono-Regular, monospace;
    }
    #status[data-failed="true"] { color: #ff735f; }
  </style>
</head>
<body>
  <main>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <div id="status">GPU: loading WebGPU sample</div>
  </main>
