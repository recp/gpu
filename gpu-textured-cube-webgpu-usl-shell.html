<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="gallery.css?v=17">
  <title>Rotating cube · GPU + USL</title>
</head>
<body class="sample-page"
      data-c-source="sources/textured-cube.c"
      data-usl-source="sources/textured-cube.usl"
      data-wgsl-source="sources/textured-cube.wgsl">
  <header class="sample-head">
    <a class="back-link" href="index.html"><span>←</span> Sample index</a>
    <div class="sample-heading">
      <p>Render / cglm + texture</p>
      <h1>Rotating cube</h1>
    </div>
    <div class="runtime-badge"><i></i> WebGPU live</div>
  </header>

  <main class="sample-workbench">
    <section class="stage" aria-label="Live WebGPU output">
      <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
      <aside class="debug-overlay" aria-label="Debug metrics">
        <button class="debug-toggle" type="button" aria-expanded="true">
          <span>Debug</span>
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <path d="m4 6 4 4 4-4"/>
          </svg>
        </button>
        <div class="debug-metrics" aria-live="off">
          <b data-debug="fps">-- FPS</b>
          <span data-debug="frame">-- ms frame</span>
          <span data-debug="canvas">-- × -- px</span>
        </div>
      </aside>
      <div class="stage-meta">
        <p><a class="project-link" href="https://github.com/recp/cglm" target="_blank" rel="noreferrer">cglm</a> drives a rotating model-view-projection matrix through an indexed, depth-tested textured draw.</p>
        <div id="status">GPU: loading sample</div>
      </div>
    </section>

    <section class="source-panel" aria-label="Source">
      <div class="source-toolbar">
        <div class="source-tabs" role="tablist" aria-label="Source language">
          <button id="tab-c" role="tab" aria-selected="true"
                  aria-controls="source-code" data-source="c">GPU C</button>
          <button id="tab-usl" role="tab" aria-selected="false"
                  aria-controls="source-code" data-source="usl">USL</button>
          <button id="tab-wgsl" role="tab" aria-selected="false"
                  aria-controls="source-code" data-source="wgsl">Generated WGSL</button>
        </div>
        <button class="copy-button" type="button">Copy</button>
      </div>
      <pre id="source-code" role="tabpanel" aria-labelledby="tab-c"
           tabindex="0"><span class="line-numbers" aria-hidden="true"></span><code>Loading source…</code></pre>
    </section>
  </main>

  <script>
    const gpuPageParams = new URLSearchParams(window.location.search);
    const gpuAssetVersion = encodeURIComponent(
      gpuPageParams.get("v") || "17"
    );
    var Module = {
      locateFile(path, prefix) {
        return `${prefix}${path}?v=${gpuAssetVersion}`;
      }
    };

    const sampleRuntime = document.createElement("script");

    sampleRuntime.src = `sample.js?v=${gpuAssetVersion}`;
    sampleRuntime.async = false;
    document.body.appendChild(sampleRuntime);
  </script>
  <template id="runtime-script">{{{ SCRIPT }}}</template>
  <script>
    const runtimeTemplate = document.querySelector("#runtime-script");
    const runtimeSource = runtimeTemplate.content
      .querySelector("script")
      .getAttribute("src");
    const runtime = document.createElement("script");

    runtime.src = `${runtimeSource}?v=${gpuAssetVersion}`;
    runtime.async = false;
    document.body.appendChild(runtime);
  </script>
</body>
</html>
